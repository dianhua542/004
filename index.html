
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单拨号表</title>
<style>
body{font-size:16px;padding:10px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:10px;text-align:center;}
th{background:#f0f0f0;}
a{color:#0066cc;text-decoration:none;font-weight:bold;}

/* 默认状态：绿色 */
.status{background:#d4edda;color:#000;font-weight:bold;}

/* 已拨打：红色 */
.status.done{background:#f8d7da;color:#000;}
</style>
<script>
function makeCall(el, phone) {
    // 点击后变红色 + 显示已拨打
    el.parentNode.className = "status done";
    el.innerText = "已拨打";
    window.location.href = "tel:" + phone;
}
</script>
</head>
<body>
<h3>订单拨号列表</h3>
<table>
<tr>
  <th>订单号</th>
  <th>手机号</th>
  <th>状态</th>
</tr>

<tr>
  <td>6925480162307833344</td>
  <td>15782118375,4582</td>
  <td class="status">
    <a href="javascript:;" onclick="makeCall(this,'15782118375,4582')">一键拨号</a>
  </td>
</tr>

<tr>

  <td class="status">
    <a href="javascript:;" onclick="makeCall(this,'15784619402,5057')">一键拨号</a>
  </td>

  </td>
</tr>

</table>
</body>
</html>
